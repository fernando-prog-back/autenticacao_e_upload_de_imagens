<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
        }

        .container{
            width: 380px;
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }

        .logo{
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1{
            color: #2563eb;
            font-size: 32px;
        }

        .logo p{
            color: #64748b;
            margin-top: 10px;
        }

        .input-group{
            margin-bottom: 20px;
        }

        .input-group label{
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-weight: bold;
        }

        .input-group input{
            width: 100%;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus{
            border-color: #2563eb;
        }

        .remember{
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .remember label{
            color: #475569;
            font-size: 14px;
        }

        .btn-login{
            width: 100%;
            padding: 14px;
            border: none;
            background: #2563eb;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover{
            background: #1d4ed8;
        }

        .footer{
            text-align: center;
            margin-top: 20px;
        }

        .footer a{
            text-decoration: none;
            color: #2563eb;
            font-size: 14px;
        }

    </style>

</head>
<body>

    <div class="container">

        <div class="logo">
            <h1>LOGIN</h1>
            <p>Sistema de Autenticação</p>
        </div>

        <form method="post">

            <div class="input-group">
                <label for="email">Email</label>

                <input
                    type="email"
                    placeholder="Digite seu email"
                    name="email"
                >
            </div>

            <div class="input-group">
                <label for="password">Senha</label>

                <input
                    type="password"
                    placeholder="Digite sua senha"
                    name="password"
                >
            </div>

            <button class="btn-login" type="submit">
                Entrar
            </button>

        </form>

        <div class="footer">
            <a href="#">
                Esqueceu sua senha?
            </a>
        </div>

    </div>

</body>
</html>
