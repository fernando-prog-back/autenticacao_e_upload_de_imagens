<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="static/estilo/login.css">
</head>
<body>

    <div class="container">

        <div class="logo">
            <h1>
             FileHub
            </h1>
            <p>Simplicidade no download de arquivos</p>
        </div>
        <form method="post">

            <div class="input-group">
                <label for="email">Email</label>

                <input  type="email" placeholder="Digite seu email"name="email">
            </div>

            <div class="input-group">
                <label for="password">Senha</label>

                <input
                    type="password"
                    placeholder="Digite sua senha"
                    name="password"
                >
            </div>

            <button class="btn-login" type="submit">
                Entrar
            </button>

            <div class="footer">
            <a href="#">
                Esqueceu sua senha?
            </a>
             <a href="#" id="create-account">
                Criar uma conta
            </a>
        </div>

        </form>

        <img src="static/imagens/pessoa.png" alt="" id="pessoa">

    </div>

</body>
</html>
