<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CompetCode Demo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body{
            color:#f1f5f9;
            position: relative;

    }
    .sidebar{
        height:100vh;
        padding:15px;
    }
    .section{
        display:none;
    }
    .active{
        display:block;
    }
    .card{
        background:#1e293b;
        border:1px solid #334155;
    }

    .shadow{
        box-shadow: inset 0px 0px 10px rgba(0, 0, 0, 0.138);
        display: block;
    }
    #titulo{
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        font-size: small;
        font-weight: bold;
        transform: translateY(50%);

    }
    #txt{
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        font-size: small;
        font-weight: 600;
    }
    #card{
        background-image: linear-gradient(180deg,rgba(28, 124, 233, 0.678),rgb(18, 107, 223));
        border-radius: 5px;
        height: 30px;
        width: 30px;
        margin-bottom: 30px;
        margin-left: 10px;
        padding: 0;
    }
    .logo{
        font-family: cursive;
        text-align: center;
        font-size: 9pt;
        font-weight: bold;
        transform: translateY(50%);
    }
    #book{
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        font-size: medium;
        text-decoration: none;
    }
    .main_grade{
        display: block;
        width: 74vw;
        background-color:blue;
        height: 100vh;
        position: absolute;
        top: 0%;
        left: 25.2%;
    }
    #act{
        font-size: small;
        text-decoration: none;
    }
    .header{
        height: 40px;
        background-color: rgba(226, 226, 230, 0.932);
        display: grid;
        grid-template-columns: 30% 70%;
        margin-bottom: 10px;
    }
    #disc{
        margin-left: 15px;
        font-size: 12pt;    
        transform: translateY(50%);
    }
    #perf{
        width: 30px;
        height: 30px;
        border-radius: 50%;
        margin-right: 20px;
    }
    #left{
        text-align: right;
        padding-right: 20px;
        transform: translateY(10%);
    }
    #left>a{
        text-decoration: none;
    }
    .folha{
        position: relative;
        width: 60%;
        height: 70%;
        margin: auto;
        padding: 3px;
        background-image: url(../../static/img/folha.png);
        background-size: 100% 100%;
        background-repeat: no-repeat;
        
    }
    #new_pag{
        position: absolute;
        text-align: center;
        top: 0%;
        right: 0%;
        font-size: 8pt;
        width: 150px;
        width: 90px;
        transform: translateX(100%);
        
    }
    #texto{
        width: 100%;
        height: 80px;
        resize: none;
        overflow-y: auto;
        outline: none;
        border-radius: 2px;
        border: 1px solid rgba(52, 162, 252, 0);
    }
    .mae-texto{
        width: 65%;
        height: 20%;
        margin: auto;

    }
    .mandar{
        width: 150px;
        border: none;
        height: 40px;
        margin-right: 10px;
        border-radius: 10px;
    }
    .mae_button{
        display: flex;
        justify-content: right;
    }
    
    h6.nome{
        display: inline;
        color: #0f172a;
        margin-right: 15px;
    }
    #abbr{
        text-decoration: none;
    }
</style>

</head>

<body>

<div class="container-fluid bg-white shadow">
    <div class="row">
        <!-- SIDEBAR -->
        <div class="col-md-3 sidebar bg-light shadow">
            <div class="row">
                <div class="col-3" id="card"><h6 class="logo">MV</h6></div>
                <div class="col-9"><h5 class="text-black w-100" id="titulo">Muchila virtual</h5></div>
            </div>
        
            <a href="#" class="btn btn-primary w-100 mb-2"> + Novo Caderno</a>
            <p class="text-black" id="txt">Meus Cadernos</p>
            <p>
                <a href="#" id="book">&#x1F4D2;  Matemática</a>
            </p>
        </div>
    </div>
</div>  

<main class="bg-white main_grade">
    <div class="header"> 
        <div>
            <h5 class="text-black" id="disc">Matemática <a href="#" id="act"> &#x1F58B;</a></h5>
        </div>
        <div id="left">
            <h6 class="nome">Fernando Albino</h6>
            <img id="perf" src="../../static/img/default.jpeg">
            <a href="#"><abbr title="Eliminar o Caderno" id="abbr">&#x1F5D1;</abbr></a>
        </div>
    </div>

    <div class="folha">
        <a href="#" class="btn-primary btn" id="new_pag">nova pagina</a>
    </div>
    <div class="mae-texto">
        <form action="" method="post" enctype="multipart/form-data">
            <textarea name="texto" id="texto" placeholder="Escreva os seus paragrafos neste campo..."></textarea>
            
            <div class="mae_button">
                <button type="submit" class="mandar btn btn-success w-10 mb-2">Mandar</button>
            </div>        
        </form>
    </div>
</main>



</body>
</html>
