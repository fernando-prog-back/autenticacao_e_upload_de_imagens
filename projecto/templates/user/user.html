<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>User System Full</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    display:flex;
    height:100vh;
    background:#0f172a;
}

/* SIDEBAR */

.sidebar{
    width:240px;
    background:#111827;
    padding:20px;
    color:white;
}

.sidebar h2{
    text-align:center;
    color:#22c55e;
    margin-bottom:30px;
}

.menu a{
    display:block;
    padding:12px;
    color:white;
    text-decoration:none;
    margin-bottom:10px;
    border-radius:8px;
    cursor:pointer;
}

.menu a:hover{
    background:#1d4ed8;
}

.menu a.active{
    background:#22c55e;
}

/* MAIN */

.main{
    flex:1;
    padding:20px;
    color:white;
}

.section{
    display:none;
}

.section.active{
    display:block;
}

.box{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-top:15px;
}

/* FILE ROW */

.file{
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #334155;
}

/* BUTTONS */

.btn{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.download{
    background:#3b82f6;
    color:white;
}

.upload{
    background:#22c55e;
    color:white;
}

.edit{
    background:#f59e0b;
    color:white;
}

/* FEEDBACK */

.feedback{
    margin-top:15px;
    padding:10px;
    background:#0b1220;
    border-left:4px solid #22c55e;
    display:none;
    border-radius:6px;
}

/* PROFILE FORM */

.profile-form{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.profile-form label{
    font-size:14px;
    color:#cbd5e1;
}

.profile-form input{
    padding:12px;
    border-radius:8px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
    outline:none;
}

.profile-form input:focus{
    border-color:#22c55e;
}

</style>

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h2>USER</h2>

<div class="menu">

<a class="menu-link active" data-target="dashboard">Dashboard</a>
<a class="menu-link" data-target="files">Meus Arquivos</a>
<a class="menu-link" data-target="downloads">Downloads</a>
<a class="menu-link" data-target="profile">Perfil</a>

</div>

</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div class="section active" id="dashboard">

<h1>Dashboard</h1>

<div class="box">
Sistema de usuário ativo.
</div>

</div>

<!-- FILES -->
<div class="section" id="files">

<h1>Meus Arquivos</h1>

<div class="box">

<div class="file">
<span>documento.pdf</span>
<button class="btn upload" onclick="upload()">Upload</button>
</div>

<div class="file">
<span>imagem.png</span>
<button class="btn upload" onclick="upload()">Upload</button>
</div>

<div class="feedback" id="fileMsg"></div>

</div>

</div>

<!-- DOWNLOADS -->
<div class="section" id="downloads">

<h1>Downloads</h1>

<div class="box">

<div class="file">
<span>manual.pdf</span>
<button class="btn download" onclick="download(this)">Download</button>
</div>

<div class="file">
<span>guia.pdf</span>
<button class="btn download" onclick="download(this)">Download</button>
</div>

<div class="feedback" id="downloadMsg"></div>

</div>

</div>

<!-- PROFILE -->
<div class="section" id="profile">

<h1>Perfil</h1>

<div class="box">

<form class="profile-form">

<label>Nome</label>
<input type="text" id="nameInput" value="User">

<label>Email</label>
<input type="email" value="user@email.com">

<label>Password</label>
<input type="password" value="123456">

<button type="button" class="btn edit" onclick="saveProfile()">
Guardar Alterações
</button>

</form>

<div class="feedback" id="profileMsg"></div>

</div>

</div>

</div>

<script>

/* NAVIGATION */

const links = document.querySelectorAll(".menu-link");
const sections = document.querySelectorAll(".section");

links.forEach(link => {

link.addEventListener("click", function(){

links.forEach(l => l.classList.remove("active"));
this.classList.add("active");

let target = this.getAttribute("data-target");

sections.forEach(s => s.classList.remove("active"));
document.getElementById(target).classList.add("active");

});

});

/* FEEDBACK */

function show(id, text){

let box = document.getElementById(id);
box.style.display = "block";
box.innerText = text;

setTimeout(()=>{
    box.style.display = "none";
},2000);

}

/* DOWNLOAD */

function download(btn){

let file = btn.parentElement.querySelector("span").innerText;

show("downloadMsg","A transferir: " + file);

}

/* UPLOAD */

function upload(){

show("fileMsg","Upload concluído com sucesso!");

}

/* PROFILE SAVE */

function saveProfile(){

let name = document.getElementById("nameInput").value;

show("profileMsg","Perfil atualizado: " + name);

}

</script>

</body>
</html>
